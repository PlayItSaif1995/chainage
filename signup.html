<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Start Free Trial — Chainage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0a0f1e; --ink2: #2d3a52; --muted: #6b7a96;
      --border: #e2e7f0; --bg: #f7f9fc; --white: #ffffff;
      --accent: #1a56db; --accent2: #0e3fa8;
      --error: #dc2626; --success: #059669;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--bg);
      color: var(--ink); min-height: 100vh;
      display: flex; flex-direction: column; -webkit-font-smoothing: antialiased;
    }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 4px 24px rgba(10,15,30,0.06);
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 32px;
    }
    .auth-logo-mark {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-mark svg { width: 20px; height: 20px; }
    .auth-logo-text { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
    .trial-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0fdf4; color: var(--success);
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; border: 1px solid #bbf7d0;
      margin-bottom: 16px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      color: var(--ink); background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .plan-selector { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
    .plan-opt { display: none; }
    .plan-opt + label {
      display: block; text-align: center; padding: 10px 8px;
      border: 1.5px solid var(--border); border-radius: 9px;
      cursor: pointer; transition: all 0.15s; font-size: 13px; font-weight: 500;
    }
    .plan-opt:checked + label { border-color: var(--accent); background: #eff6ff; color: var(--accent); font-weight: 600; }
    .plan-opt + label .plan-price { font-size: 11px; color: var(--muted); margin-top: 2px; display: block; }
    .plan-opt:checked + label .plan-price { color: var(--accent); }
    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 20px; font-size: 13px; color: var(--muted);
    }
    .terms-row input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; accent-color: var(--accent); }
    .terms-row a { color: var(--accent); text-decoration: none; }
    .terms-row a:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%; padding: 13px; border-radius: 10px;
      background: var(--accent); color: white;
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      border: none; cursor: pointer; transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      padding: 12px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
    .alert.show { display: block; }
    .perks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .perk { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink2); }
    .perk::before { content: '✓'; color: var(--success); font-weight: 700; }
    .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; color: var(--muted); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="auth-logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 14L6 8L10 11L14 4L16 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="2" y1="16" x2="16" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="auth-logo-text">Chainage</span>
    </a>

    <div class="trial-badge">✓ 14-day free trial · No credit card required</div>
    <h1>Start planning smarter</h1>
    <p class="auth-sub">Create your account and get instant access.</p>

    <div class="perks">
      <div class="perk">Full time-chainage tool — no limits</div>
      <div class="perk">Risk register with P50/P80/P90 dates</div>
      <div class="perk">Export to PDF, PNG and Excel</div>
    </div>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="signupForm">
      <div class="name-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" id="firstName" placeholder="John" autocomplete="given-name" required>
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" id="lastName" placeholder="Smith" autocomplete="family-name" required>
        </div>
      </div>
      <div class="form-group">
        <label>Work email</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
      </div>

      <div class="form-group">
        <label style="margin-bottom:8px">Choose your plan</label>
        <div class="plan-selector">
          <input type="radio" name="plan" id="plan-individual" value="individual" class="plan-opt" checked>
          <label for="plan-individual">
            Individual<span class="plan-price">£49/mo</span>
          </label>
          <input type="radio" name="plan" id="plan-team" value="team" class="plan-opt">
          <label for="plan-team">
            Team<span class="plan-price">£149/mo</span>
          </label>
          <input type="radio" name="plan" id="plan-enterprise" value="enterprise" class="plan-opt">
          <label for="plan-enterprise">
            Enterprise<span class="plan-price">£399/mo</span>
          </label>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-submit" id="signupBtn">
        <span class="btn-text">Create free account</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://dutwdbjpniiqtifrcvfp.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_7tkCapKdEyLyLcOBDUqQBg_j08PlZb8';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Pre-select plan from URL param e.g. signup.html?plan=team
  const urlPlan = new URLSearchParams(window.location.search).get('plan');
  if (urlPlan) {
    const radio = document.getElementById('plan-' + urlPlan);
    if (radio) radio.checked = true;
  }

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    const errorAlert = document.getElementById('errorAlert');
    const successAlert = document.getElementById('successAlert');

    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const plan      = document.querySelector('input[name="plan"]:checked').value;

    btn.classList.add('loading'); btn.disabled = true;
    errorAlert.classList.remove('show');
    successAlert.classList.remove('show');

    // Create Supabase auth account
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: {
        data: { first_name: firstName, last_name: lastName, plan }
      }
    });

    if (error) {
      errorAlert.textContent = error.message;
      errorAlert.classList.add('show');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }

    // Show success — user needs to verify email
    successAlert.textContent = `✓ Account created! Check ${email} for a verification link, then sign in.`;
    successAlert.classList.add('show');
    document.getElementById('signupForm').style.display = 'none';
  });
</script>
</body>
</html>
