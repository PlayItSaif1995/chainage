<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Chainage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0a0f1e; --ink2: #2d3a52; --muted: #6b7a96;
      --border: #e2e7f0; --bg: #f7f9fc; --white: #ffffff;
      --accent: #1a56db; --accent2: #0e3fa8;
      --error: #dc2626; --success: #059669;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .auth-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(10,15,30,0.06);
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 32px;
    }
    .auth-logo-mark {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-mark svg { width: 20px; height: 20px; }
    .auth-logo-text { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .auth-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--ink2); margin-bottom: 6px;
    }
    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 15px; font-family: 'DM Sans', sans-serif;
      color: var(--ink); background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
    .forgot-link {
      font-size: 13px; color: var(--accent); text-decoration: none;
      float: right; margin-top: -4px;
    }
    .forgot-link:hover { text-decoration: underline; }
    .btn-submit {
      width: 100%; padding: 13px; border-radius: 10px;
      background: var(--accent); color: white;
      font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
      border: none; cursor: pointer; transition: background 0.15s;
      margin-top: 8px;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0; color: var(--muted); font-size: 13px;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .auth-footer {
      margin-top: 24px; text-align: center;
      font-size: 14px; color: var(--muted);
    }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert {
      padding: 12px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 18px; display: none;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
    .alert.show { display: block; }
    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="auth-logo">
      <div class="auth-logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 14L6 8L10 11L14 4L16 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="2" y1="16" x2="16" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="auth-logo-text">Chainage</span>
    </a>

    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your Chainage account</p>

    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">
          Password
          <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
        </label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">
        <span class="btn-text">Sign in</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Start free trial</a>
    </div>
  </div>
</div>

<script>
  // ── SUPABASE CONFIG ──
  // Replace these two values with your own from supabase.com → Project Settings → API
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // If already logged in, go straight to the app
  sb.auth.getSession().then(({ data }) => {
    if (data.session) checkAccessAndRedirect(data.session.user);
  });

  async function checkAccessAndRedirect(user) {
    // Check if user has active access (paid or beta)
    const { data } = await sb.from('user_access').select('*').eq('user_id', user.id).single();
    if (data && (data.is_beta || data.is_active)) {
      window.location.href = 'app/index.html';
    } else {
      window.location.href = 'subscribe.html';
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorAlert = document.getElementById('errorAlert');
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.classList.add('loading'); btn.disabled = true;
    errorAlert.classList.remove('show');

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errorAlert.textContent = error.message === 'Invalid login credentials'
        ? 'Incorrect email or password. Please try again.'
        : error.message;
      errorAlert.classList.add('show');
      btn.classList.remove('loading'); btn.disabled = false;
      return;
    }

    await checkAccessAndRedirect(data.user);
  });
</script>
</body>
</html>
