<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Chainage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0a0f1e; --ink2: #2d3a52; --muted: #6b7a96;
      --border: #e2e7f0; --bg: #f7f9fc; --white: #fff;
      --accent: #1a56db; --accent2: #0e3fa8;
      --error: #dc2626; --success: #059669;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; -webkit-font-smoothing: antialiased; }
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(10,15,30,0.06); }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 32px; }
    .logo-mark { width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 20px; height: 20px; }
    .logo-text { font-size: 20px; font-weight: 700; color: var(--ink); }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--ink2); margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--ink); outline: none; transition: border-color 0.15s, box-shadow 0.15s; margin-bottom: 16px; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    .btn { width: 100%; padding: 13px; border-radius: 10px; background: var(--accent); color: white; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; border: none; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: var(--accent2); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: var(--error); }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: var(--success); }
    .alert.show { display: block; }
    .back { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted); text-decoration: none; }
    .back span { color: var(--accent); font-weight: 500; }
    .back:hover span { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none"><path d="M2 14L6 8L10 11L14 4L16 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="16" x2="16" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text">Chainage</span>
    </a>
    <h1>Reset your password</h1>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <div class="alert alert-error" id="err"></div>
    <div class="alert alert-success" id="ok"></div>
    <form id="resetForm">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@company.com" required autocomplete="email">
      <button type="submit" class="btn" id="btn">Send reset link</button>
    </form>
    <a href="login.html" class="back">← Back to <span>sign in</span></a>
  </div>
<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const email = document.getElementById('email').value.trim();
    btn.disabled = true; btn.textContent = 'Sending…';
    document.getElementById('err').classList.remove('show');

    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    });

    if (error) {
      document.getElementById('err').textContent = error.message;
      document.getElementById('err').classList.add('show');
      btn.disabled = false; btn.textContent = 'Send reset link';
    } else {
      document.getElementById('ok').textContent = `✓ Reset link sent to ${email}. Check your inbox.`;
      document.getElementById('ok').classList.add('show');
      document.getElementById('resetForm').style.display = 'none';
    }
  });
</script>
</body>
</html>
